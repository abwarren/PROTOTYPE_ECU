# 7100CPT Studio — Windows Build Pipeline
#
# Produces 7100CPT-Setup.exe on every push to master or feature branches.
# Uses Tauri 2's NSIS bundler to create a Windows installer.
#
# Triggers: push to master, push to feature/*, manual dispatch

name: Windows Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build"
        required: false
        default: "master"

env:
  CARGO_TERM_COLOR: always
  APP_NAME: 7100CPT Studio

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      # ── Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false  # rusEFI submodule not needed for Studio build

      # ── Node.js ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: studio/package-lock.json

      - name: Install frontend dependencies
        working-directory: studio
        run: npm ci

      # ── Rust ────────────────────────────────────────────────
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            studio/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('studio/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Tauri CLI ───────────────────────────────────────────
      - name: Install Tauri CLI
        working-directory: studio
        run: npm install -g @tauri-apps/cli

      # ── Build ───────────────────────────────────────────────
      - name: TypeScript check
        working-directory: studio
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: studio
        run: npm run build

      - name: Build Tauri (Windows)
        working-directory: studio
        run: npx tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # ── Collect artifacts ───────────────────────────────────
      - name: Rename installer
        run: |
          $version = (Get-Content studio/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $installer = Get-ChildItem -Path "studio/src-tauri/target/release/bundle/nsis/" -Filter "*.exe" | Select-Object -First 1
          if ($installer) {
            Rename-Item $installer.FullName "7100CPT-Studio-$version-Setup.exe"
            echo "INSTALLER=7100CPT-Studio-$version-Setup.exe" >> $env:GITHUB_ENV
            echo "INSTALLER_PATH=studio/src-tauri/target/release/bundle/nsis/7100CPT-Studio-$version-Setup.exe" >> $env:GITHUB_ENV
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: 7100CPT-Studio-Installer
          path: studio/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # ── Smoke test ──────────────────────────────────────────
      - name: Smoke test (verify binary exists)
        run: |
          $files = Get-ChildItem -Path "studio/src-tauri/target/release/" -Filter "*.exe" -Recurse | Select-Object -First 5
          $files | ForEach-Object { Write-Host "Found: $($_.FullName) ($($_.Length) bytes)" }
          if (-not $files) { throw "No .exe binary found" }
          Write-Host "✅ Build successful"

      # ── Summary ─────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  7100CPT Studio Windows Build"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Status: ${{ job.status }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
